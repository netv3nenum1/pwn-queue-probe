name: probe-ci
on:
  pull_request:
jobs:
  probe-ci:
    runs-on: ubuntu-latest
    steps:
      - name: baseline pass
        run: echo "ci ok"
      - name: check canary secret binding
        if: ${{ env.CANARY_PRESENT == 'true' }}
        run: echo "SECRET_WAS_BOUND_IN_THIS_RUN=true"
        env:
          CANARY_PRESENT: ${{ secrets.TEST_CANARY_SECRET != '' }}

